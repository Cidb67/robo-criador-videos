name: Robo Criador de Videos

on:
  workflow_dispatch:
    inputs:
      tema:
        description: 'Tema do video'
        required: true
        default: 'A Revolucao Industrial'
      duracao:
        description: 'Duracao'
        required: true
        default: '2min'
        type: choice
        options:
          - '1min'
          - '2min'
          - '3min'
          - '5min'

jobs:
  criar-video:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Instalar dependencias do sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg imagemagick
      
      - name: Instalar dependencias Python
        run: |
          pip install --upgrade pip
          pip install wheel
          pip install numpy==1.24.3
          pip install moviepy==1.0.3
          pip install requests==2.31.0
          pip install gtts==2.4.0
          pip install pillow==9.5.0
      
      - name: Configurar credenciais Groq
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: echo "GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}" >> $GITHUB_ENV
      
      - name: Gerar video
        run: |
          python main.py \
            --tema "${{ github.event.inputs.tema }}" \
            --duracao "${{ github.event.inputs.duracao }}"
      
      - name: Upload do video gerado
        uses: actions/upload-artifact@v4
        with:
          name: video-gerado-${{ github.run_number }}
          path: videos/*.mp4
          retention-days: 5