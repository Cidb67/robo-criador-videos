name: Robo Criador de Videos

on:
  workflow_dispatch:
    inputs:
      tema:
        description: 'Tema do video'
        required: true
        default: 'A Revolucao Industrial'
      duracao:
        description: 'Duracao'
        required: true
        default: '2min'
        type: choice
        options:
          - '1min'
          - '2min'
          - '3min'
          - '5min'

jobs:
  criar-video:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
      
      - name: Instalar dependencias
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg imagemagick
          pip install -r requirements.txt
      
      - name: Configurar credenciais
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> $GITHUB_ENV
      
      - name: Gerar video
        run: |
          python main.py \
            --tema "${{ github.event.inputs.tema }}" \
            --duracao "${{ github.event.inputs.duracao }}"
      
      - name: Upload do video gerado
        uses: actions/upload-artifact@v4
        with:
          name: video-gerado-${{ github.run_number }}
          path: videos/*.mp4
          retention-days: 5